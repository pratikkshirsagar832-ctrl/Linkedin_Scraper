version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env.production
    volumes:
      - ./sessions:/app/sessions
    restart: unless-stopped
    networks:
      - leadgen

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://85.239.237.53/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - leadgen

networks:
  leadgen:
    driver: bridge
